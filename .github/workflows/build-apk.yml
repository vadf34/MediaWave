name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build Debug APK
        run: gradle assembleDebug
        working-directory: MediaWave

      - name: Build Release APK
        run: gradle assembleRelease
        working-directory: MediaWave

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaWave-debug
          path: MediaWave/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaWave-release
          path: MediaWave/app/build/outputs/apk/release/*.apk
          retention-days: 30
